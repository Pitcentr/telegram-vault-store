
version: "3.7"

services:
  app:
    image: pitcentr/telegram-vault:latest
    user: "1000:1000"
    init: true
    restart: unless-stopped
    stop_grace_period: 1m
    volumes:
      - ${APP_DATA_DIR}/.env:/app/.env
    environment:
      TG_TOKEN: ${APP_TELEGRAM_TOKEN}
      PB_URL: ${APP_POCKETBASE_URL:-http://pocketbase_server:8090}
      PB_ADMIN: ${APP_POCKETBASE_ADMIN}
      PB_PASSWORD: ${APP_POCKETBASE_PASSWORD}
      MASTER_PASSWORD: ${APP_MASTER_PASSWORD}
      ALLOWED_USERS: ${APP_ALLOWED_USERS}
