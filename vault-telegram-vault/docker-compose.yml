
version: "3.7"

services:
  app:
    image: pitcentr/telegram-vault:latest
    user: "1000:1000"
    init: true
    restart: unless-stopped
    stop_grace_period: 1m
    env_file: .env
    environment:
      # Default PocketBase URL (can be overridden in .env)
      PB_URL: "http://pocketbase_server:8090"
