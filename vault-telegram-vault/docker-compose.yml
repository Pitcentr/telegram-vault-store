
version: "3.7"

services:
  app:
    image: pitcentr/telegram-vault:latest
    user: "1000:1000"
    init: true
    restart: unless-stopped
    stop_grace_period: 1m
    environment:
      TG_TOKEN: ""
      PB_URL: "http://pocketbase_server:8090"
      PB_ADMIN: ""
      PB_PASSWORD: ""
      MASTER_PASSWORD: ""
      ALLOWED_USERS: ""
